name: MedRecordAudit
description: "RL environment for medical record auditing — AI agents find missed diagnoses, drug interactions, and contradictions in patient histories"
version: "0.1.0"

tasks:
  - name: easy
    description: "Simple cases with 20 records and 1 obvious issue (allergy violation, drug interaction, or contraindication)"
    grader: env.graders.easy_grader
  - name: medium
    description: "Moderate cases with 80 records and 3 hidden issues across multiple specialists"
    grader: env.graders.medium_grader
  - name: hard
    description: "Complex cases with 150 records, 5-6 interconnected issues, and cascading drug interactions"
    grader: env.graders.hard_grader

env:
  port: 7860
  docker: true
